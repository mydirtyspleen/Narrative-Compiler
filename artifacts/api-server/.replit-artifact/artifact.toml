kind = "api"
previewPath = "/api"
title = "ADM-API"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace/artifacts/api-server && uvicorn adm_api.main:app --host 0.0.0.0 --port 8080 --reload"

[services.production]

[services.production.build]
args = ["echo", "no-build-step"]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && uvicorn adm_api.main:app --host 0.0.0.0 --port 8080 --workers 4"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
